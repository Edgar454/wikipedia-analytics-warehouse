version: 2

models:

  - name: dim_date
    description: >
      Hourly date dimension covering the analysis period.
      Generated in dbt without external dependencies.
      Supports time-based aggregation at hour, day, month, and year levels.
    columns:
      - name: date_id
        description: Surrogate key in YYYYMMDDHH format used for joins with fact tables.
        tests:
          - unique
          - not_null

      - name: datehour
        description: Hourly timestamp representing the grain of the dimension.
        tests:
          - unique
          - not_null

      - name: year
        tests: [not_null]

      - name: month
        tests: [not_null]

      - name: day
        tests: [not_null]

      - name: day_of_week
        description: Numeric representation of weekday.
        tests: [not_null]

      - name: hour
        tests: [not_null]

      - name: is_weekend
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

      - name: day_name
        tests: [not_null]

      - name: month_name
        tests: [not_null]


  - name: dim_entity
    description: >
      Entity dimension derived from Wikidata.
      Represents Wikipedia-referenced entities enriched with descriptive metadata.
      Each row corresponds to one Wikidata entity.
    columns:
      - name: entity_id
        description: Wikidata entity identifier.
        tests:
          - unique
          - not_null

      - name: numeric_id
        description: Numeric component of the Wikidata identifier.
        tests:
          - not_null

      - name: en_wiki
        description: English Wikipedia page title associated with the entity.

      - name: en_label
        description: Human-readable label of the entity.

      - name: en_description
        description: Short textual description of the entity.

      - name: first_instance_of_id
        description: >
          Primary instance_of type associated with the entity.
          Selected from the instance_of array without semantic ordering guarantees.

  - name: fact_pageviews
    description: >
      Core fact table at grain (wiki, title, datehour).
      Represents aggregated pageview events from Wikipedia.
    columns:
      - name: pageview_id
        description: Surrogate key uniquely identifying a pageview record.
        tests:
          - not_null

      - name: wiki
        description: Wikipedia language edition code.
        tests:
          - not_null

      - name: title
        description: Wikipedia page title.
        tests:
          - not_null

      - name: views
        description: Number of page requests for the given hour.
        tests:
          - not_null

      - name: datehour
        description: Hourly timestamp of the pageview event.
        tests:
          - not_null

      - name: page_type
        description: Classification of page based on namespace and naming rules.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [article, namespace, wikiquote, wiktionary, mediawiki, wikisource, wikibooks, wikiversity, wikivoyage, wikinews, donation, commons, wikispecies, portal]


  - name: gold_pageviews_enriched
    description: >
      Analytical view joining pageviews with entity and language dimensions.
      Provides multilingual entity enrichment and supports downstream aggregation
      for dashboards and analytical marts.

      Includes matched and unmatched signals used to analyze coverage gaps
      between Wikipedia traffic and Wikidata coverage.
    columns:
      - name: pageview_id
        description: Surrogate key from fact_pageviews.
        tests:
          - not_null

      - name: wiki
        tests: [not_null]

      - name: title
        tests: [not_null]

      - name: views
        tests: [not_null]

      - name: page_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [article, namespace, wikiquote, wiktionary, mediawiki, wikisource, wikibooks, wikiversity, wikivoyage, wikinews, donation, commons, wikispecies, portal]

      - name: is_matched
        description: Indicates whether pageview was matched to a Wikidata entity.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

      - name: language_name
        description: Human-readable Wikipedia language name.

      - name: is_mobile
        description: Indicates whether traffic originates from mobile Wikipedia.

      - name: year
      - name: month

      - name: entity_type_label
        description: Entity type label when available.
        tests:
          - not_null

      - name: is_structural
        description: Indicates whether matched entity type is structural.

      - name: entity_label
        description: Entity label when available.
        tests:
          - not_null

  - name: mart_semantic_attention_base
    description: >
      Core analytical cube derived from enriched Wikipedia pageviews.
      Represents the primary semantic attention surface used by all downstream marts.

      Grain:
      one row per
      (date_id, analysis_key, language_name, is_mobile).

      This mart performs three successive transformations:

      1. Hourly to daily aggregation:
      Gold layer is scanned exactly once at hourly grain, then collapsed
      to daily grain. This single-scan pattern minimises BigQuery scan costs
      across the full view chain from raw pageviews to gold.

      2. Long-tail bucketing:
      Entities receiving fewer than 1000 daily views within a given
      (date_id, analysis_key) partition are collapsed into two anonymous buckets:
      - OTHER_MATCHED: low-traffic matched Wikidata entities
      - OTHER_UNMATCHED: low-traffic unmatched article-level entries
      This bucketing anonymises approximately 62% of total views while
      preserving mass conservation, reducing Power BI dataset cardinality
      and improving query performance on downstream serving models.

      3. Dimension nullification for unmatched buckets:
      OTHER_UNMATCHED rows have entity_label and entity_type_label set to NULL
      to prevent unmatched long-tail noise from polluting matched entity dimensions.
      OTHER_MATCHED rows receive a synthetic 'other' label to preserve
      aggregability within the matched population.

      The analysis_key abstraction unifies:
      - matched Wikidata entities: E:<numeric_id>
      - unmatched article-level entries: T:<wiki>:<title>

      Acts as the single materialized checkpoint in the mart layer.
      All downstream marts are views over this table, inheriting its
      bucketing and grain without additional materialization cost.

    columns:
      - name: date_id
        description: >
          Calendar date of the aggregated attention signal.
          Derived from DATE(datehour) in the gold layer.
        tests:
          - not_null

      - name: analysis_key
        description: >
          Unified semantic identifier used across the analytical cube.

          Format:
          - E:<numeric_id> for matched Wikidata entities
          - T:<wiki>:<title> for unmatched article-level entries
          - OTHER_MATCHED for bucketed low-traffic matched entities
          - OTHER_UNMATCHED for bucketed low-traffic unmatched entries
        tests:
          - not_null


      - name: language_name
        description: >
          Human-readable language name associated with wiki_group.
        tests:
          - not_null

      - name: is_mobile
        description: >
          Whether this row represents mobile traffic (TRUE) or desktop (FALSE).
        tests:
          - not_null

      - name: page_type
        description: >
          Wikimedia page namespace type (e.g. article, commons, namespace).
        tests:
          - not_null

      - name: entity_label
        description: >
          Human-readable entity label from Wikidata.
          Set to 'other' for OTHER_MATCHED bucket rows.
          NULL for OTHER_UNMATCHED bucket rows.
          NULL for unmatched non-bucketed rows where no Wikidata label exists.

      - name: entity_type_label
        description: >
          Wikidata entity type classification (e.g. human, film, taxon).
          Set to 'other' for OTHER_MATCHED bucket rows.
          NULL for OTHER_UNMATCHED bucket rows.

      - name: is_matched
        description: >
          Whether this row was successfully resolved to a Wikidata entity.
          TRUE for matched and OTHER_MATCHED rows.
          FALSE for unmatched and OTHER_UNMATCHED rows.
        tests:
          - not_null

      - name: is_structural_entity
        description: >
          Whether this entity represents Wikimedia structural infrastructure
          rather than content (e.g. portals, project pages).
          Always FALSE for bucketed rows regardless of original value.
        tests:
          - not_null

      - name: daily_views
        description: >
          Total number of pageviews aggregated at the mart grain.
          Sum of all hourly views within the (date_id, analysis_key, language_name, is_mobile) partition.
          For bucketed rows, represents the collapsed sum of all
          long-tail entities within that bucket.
        tests:
          - not_null

  - name: mart_semantic_attention_growth
    description: >
      Temporal enrichment layer built on top of mart_semantic_attention_base.
      Computes rolling statistics and derived signals used by all downstream trend,
      anomaly, and cross-language marts.

      Grain:
      one row per
      (date_id, analysis_key, language_name, is_mobile).

      This mart introduces:
      - 3-day rolling averages (raw and log-smoothed) for trend estimation
      - 3-day rolling standard deviation for volatility measurement
      - day-over-day growth rate and attention delta
      - peak retention relative to entity historical maximum
      - previous 3-day window statistics (excluding current day) for self-relative
        anomaly detection baselines

      All window functions use UNIX_SECONDS ordering to support
      RANGE-based frame semantics in BigQuery.

      Acts as the single enrichment source for:
      - mart_trends_daily (matched trend signals)
      - mart_unmatched_surface_features (unmatched trend signals)
      - mart_cross_language_propagation (attention share and breadth)

    columns:
      - name: analysis_key
        description: >
          Unified semantic identifier inherited from mart_semantic_attention_base.
          E:<numeric_id> for matched entities, T:<wiki>:<title> for unmatched.
        tests:
          - not_null

      - name: daily_views
        description: >
          Total pageviews for this grain, inherited from mart_semantic_attention_base.
        tests:
          - not_null

      - name: prev_views
        description: >
          Daily views from the immediately preceding day for the same partition.
          NULL for the first observed day of an entity.

      - name: peak_retention
        description: >
          Ratio of current daily views to the historical maximum daily views
          for this analysis_key. Measures how close to peak attention
          an entity currently is.

      - name: growth_rate
        description: >
          Day-over-day relative change in daily views.
          Computed as (daily_views - prev_views) / prev_views.
          NULL when prev_views is zero or NULL (SAFE_DIVIDE).

      - name: attention_delta
        description: >
          Absolute day-over-day change in daily views.
          Signed: positive means growth, negative means decline.

      - name: ma_3d_views
        description: >
          3-day rolling average of daily views including current day.
          Window defined as 259200 seconds (72 hours) preceding current row.
          Used as the smoothed level estimate for trend scoring.

      - name: ma_previous_3d_views
        description: >
          3-day rolling average of daily views excluding current day.
          Window defined as 259200 seconds preceding and ending 1 second
          before current row. Used as the baseline for z-score computation
          to avoid current observation contaminating its own baseline.

      - name: ma_log_3d_views
        description: >
          3-day rolling average of LN(1 + daily_views).
          Log transformation compresses scale differences across entities
          ranging from tens to millions of daily views, enabling
          comparable slope estimates regardless of entity size.

      - name: std_3d_views
        description: >
          3-day rolling standard deviation of daily views including current day.
          Used as the volatility estimate for CV and anomaly detection.

      - name: std_previous_3d_views
        description: >
          3-day rolling standard deviation of daily views excluding current day.
          Paired with ma_previous_3d_views as the denominator for z-score
          computation to ensure temporal integrity of the anomaly baseline.

  - name: mart_trends_daily
    description: >
      Matched entity trend signals derived from mart_semantic_attention_growth.
      Exposes momentum, smoothed trend scores, volatility, and anomaly signals
      for all successfully matched Wikidata entities.

      Grain:
      one row per
      (date_id, analysis_key, language_name, is_mobile)
      restricted to is_matched = TRUE.

      This mart computes three complementary analytical signals:

      Trend signal:
      smoothed_trend_score_3d measures the slope of the log-smoothed MA
      over a 7-day lag, normalized by current MA level. Captures sustained
      directional movement in attention, robust to single-day bursts.

      Momentum signal:
      momentum_score = growth_rate * SQRT(daily_views). Rewards entities
      with both high relative change and significant absolute scale.
      Used for large spike detection rather than sustained trend detection.

      Anomaly signal:
      z_score_3d_views measures how many standard deviations today's views
      deviate from the entity's own prior 3-day baseline. Self-relative:
      an entity with naturally high volatility requires a proportionally
      larger deviation to register the same z-score as a stable entity.

      Contains unrounded metrics and additional signals (cv_3d_views, volatility_slope_3d,
      smoothed_daily_trend_score_3d)  retained for diagnostic purposes
      and  not exposed to Power BI.

    columns:
      - name: analysis_key
        description: >
          Matched entity identifier in E:<numeric_id> format.
        tests:
          - not_null

      - name: daily_views
        description: >
          Total pageviews for this grain.
        tests:
          - not_null

      - name: momentum_score
        description: >
          Scale-weighted burst detector. growth_rate * SQRT(daily_views).
          Rewards large absolute attention shifts on already-significant entities.
          High values indicate a recent spike rather than sustained trend growth.

      - name: smoothed_daily_trend_score_3d
        description: >
          Daily slope of the log-smoothed MA. Measures day-over-day directional
          change in the smoothed attention signal. Sensitive to short-term
          directional shifts.

      - name: z_score_3d_views
        description: >
          Self-relative anomaly score. Number of standard deviations today's
          views deviate from this entity's own prior 3-day mean and variance.
          Cross-entity comparisons are valid only directionally, not in magnitude,
          as each entity is normalized against its own baseline.

  - name: mart_semantic_attention_unmatched
    description: >
      Trend signals for unmatched article-level attention.
      Surfaces Wikipedia pages that could not be resolved to Wikidata entities
      but exhibit significant or trending attention patterns.

      Grain:
      one row per
      (date_id, analysis_key , language_name, is_mobile)
      restricted to is_matched = FALSE.

      The smoothed_trend_score applies the same log-MA slope methodology
      as matched trend marts, enabling consistent comparison of trend
      strength across matched and unmatched populations.

      The title field is extracted from the T:<wiki>:<title> analysis_key
      format to support human-readable identification of unmatched pages
      without requiring a join to any entity dimension.

      Primary use case: identify unmatched pages with high or growing attention
      as candidates for Wikidata entity creation or model improvement.

    columns:
      - name: analysis_key
        description: >
          Unmatched page identifier in T:<wiki>:<title> format.
        tests:
          - not_null

      - name: title
        description: >
          Wikipedia page title extracted from analysis_key via SPLIT on ':'.
          Human-readable identifier for the unmatched page.

      - name: daily_views
        description: >
          Total pageviews for this grain.
        tests:
          - not_null

      - name: smoothed_trend_score
        description: >
          Log-MA slope over a 3-day lag, weighted by current MA level.
          Computed as (ma_log_3d_views - LAG(ma_log_3d_views, 3)) * ma_log_3d_views / 3.
          Positive values indicate growing unmatched attention.
          Methodologically consistent with matched trend scoring.

  - name: mart_cross_language_propagation
    description: >
      Cross-language attention distribution for matched Wikidata entities.
      Measures how attention for a given entity is distributed across
      Wikipedia language communities on a given day.

      Grain:
      one row per
      (date_id, analysis_key, language_name, is_mobile)
      restricted to is_matched = TRUE.

      Introduces two complementary breadth metrics:

      concurrent_language_count:
      number of distinct wiki_groups simultaneously covering this entity
      on a given date. Measures breadth of cross-community reach.

      attention_share:
      fraction of total daily views within a (date, is_mobile)
      partition attributable to this entity. Measures depth of attention
      within each community.

    columns:
      - name: analysis_key
        description: >
          Matched entity identifier in E:<numeric_id> format.
        tests:
          - not_null

      - name: daily_views
        description: >
          Total pageviews for this grain.
        tests:
          - not_null

      - name: concurrent_language_count
        description: >
          Number of distinct wiki_groups covering this analysis_key
          on a given date_id. Computed via COUNT(DISTINCT wiki_group)
          over the (analysis_key, date_id) partition.
          Proxy for cross-community breadth of attention.

      - name: attention_share
        description: >
          Fraction of total daily views within the (date_id, is_mobile)
          partition attributable to this entity.
          Computed as daily_views / SUM(daily_views) OVER (PARTITION BY date_id, is_mobile).
          Measures relative depth of attention within a language community.