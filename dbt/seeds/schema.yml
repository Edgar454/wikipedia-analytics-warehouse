version: 2

seeds:
  - name: dim_languages
    description: >
      Static lookup table mapping Wikipedia wiki codes to language metadata.
      Covers desktop and mobile variants (e.g. en, en.m) for all major 
      Wikipedia language communities. Used to enrich pageviews with 
      human-readable language names and grouping keys.
    columns:
      - name: wiki_code
        description: Raw wiki code as it appears in pageviews (e.g. en, fr.m, ja)
        tests:
          - unique
          - not_null
      - name: language_name
        description: Human readable language name
        tests:
          - not_null
      - name: is_mobile
        description: TRUE if this is a mobile wiki variant
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: dim_namespaces
    description: >
      Static lookup table mapping each wiki's localized namespace names to
      their canonical (English) equivalents and numeric namespace IDs.
      Sourced once per wiki edition from the MediaWiki siteinfo API
      (action=query&meta=siteinfo&siprop=namespaces). Namespace IDs and
      canonical names are constant across all MediaWiki installations;
      only namespace_name varies by language. Desktop wiki codes only —
      mobile variants (e.g. en.m) share their desktop counterpart's
      namespaces and must be resolved via base wiki code
      (SPLIT(wiki, '.')[OFFSET(0)]) before joining.
    columns:
      - name: wiki_code
        description: Base wiki code, desktop form only (e.g. en, fr, ja). Mobile suffixes are never present here.
        tests:
          - not_null
      - name: namespace_id
        description: >
          Numeric namespace identifier, constant across every MediaWiki
          installation regardless of language (e.g. -1 = Special, 6 = File).
        tests:
          - not_null
      - name: namespace_name
        description: >
          Localized namespace name as returned by the wiki's own siteinfo
          API (e.g. "Spécial" for fr, "Special" for en). Empty string, not
          null, for the main/article namespace (id 0).
        tests:
          - not_null
      - name: canonical_namespace
        description: >
          Canonical (English) namespace name, used to rewrite localized
          titles into a language-independent form (e.g. "Fichier:X.jpg"
          -> "File:X.jpg"). Null for the main namespace and for any
          wiki-specific custom namespace with no canonical equivalent.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [wiki_code, namespace_name]
    

  - name: structural_roots
    description: >
      Curated seed of known Wikidata entity type IDs that represent 
      Wikimedia infrastructure rather than real-world content.
      Used by int_structural_entities to flag noise entity types
      via subclass_of graph traversal — any entity type that is a
      subclass of these roots is considered structural.
      Add new rows when new Wikimedia infrastructure types are discovered.
    columns:
      - name: numeric_id
        description: Wikidata numeric ID (e.g. 4167836 for Wikimedia category)
        tests:
          - unique
          - not_null
      - name: label
        description: Human readable label for the structural root
        tests:
          - not_null

  - name: wiki_classifications
    description: >
      Seed-driven classification rules for Wikipedia wiki codes.
      Maps wiki code patterns to page_type categories.
      Used by int_pageviews_classified to classify non-article traffic
      without hardcoding logic in SQL.
      Adding a new Wikimedia project requires only a new CSV row —
      no model changes needed.
      Pattern matching uses BigQuery LIKE syntax:
      % prefix = starts with, % suffix = ends with.
    columns:
      - name: pattern
        description: >
          LIKE pattern to match against the wiki column.
          Examples: thankyou% matches thankyou and thankyou.m,
          %.q matches en.q, fr.q etc.
        tests:
          - unique
          - not_null
      - name: match_type
        description: >
          Whether the pattern matches a prefix or suffix of the wiki code.
          prefix = wiki LIKE pattern (e.g. thankyou%),
          suffix = wiki LIKE pattern (e.g. %.q)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [prefix, suffix]
      - name: page_type
        description: >
          The page_type value assigned when this pattern matches.
          Must match accepted_values in int_pageviews_classified and gold_pageviews_enriched.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [wikiquote, wiktionary, mediawiki, wikisource, wikibooks, wikiversity, wikivoyage, wikinews, donation, commons, wikispecies, portal]    
      - name: description
        description: Human readable explanation of what this pattern covers
        tests:
          - not_null

                          