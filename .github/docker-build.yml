name: Build and Publish Image

on:
  push:
    branches: [main]
    paths:
      - "telemetry/**"
      - "dbt/**"
      - "Dockerfile"
      - "scripts/**"

permissions:
  id-token: write
  contents: read

env:
  ECR_REPO: 234334047980.dkr.ecr.eu-west-1.amazonaws.com/wikipedia-analysis-dbt-runner

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Validate run.sh
        run: |
          bash -n scripts/run.sh

      - name: Build image
        run: |
          docker build -t wikipedia-dbt .

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image
        run: |
          docker tag wikipedia-dbt:latest $ECR_REPO:latest

      - name: Push image
        run: |
          docker push $ECR_REPO:latest

