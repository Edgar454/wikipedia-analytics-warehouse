name: dbt CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "dbt/**"

jobs:
  dbt:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dbt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          pip install dbt-bigquery

      - name: Setup GCP credentials
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > key.json
          echo "GCP_KEYFILE_PATH=key.json" >> $GITHUB_ENV
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV

      - name: dbt debug
        run: dbt debug

      - name: dbt compile
        run: dbt compile

      - name: dbt test
        run: dbt test