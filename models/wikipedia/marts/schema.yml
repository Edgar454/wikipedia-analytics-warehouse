version: 2

models:

  - name: dim_date
    description: >
      Hourly date dimension covering the analysis period.
      Generated in dbt without external dependencies.
      Supports time-based aggregation at hour, day, month, and year levels.
    columns:
      - name: date_id
        description: Surrogate key in YYYYMMDDHH format used for joins with fact tables.
        tests:
          - unique
          - not_null

      - name: datehour
        description: Hourly timestamp representing the grain of the dimension.
        tests:
          - unique
          - not_null

      - name: year
        tests: [not_null]

      - name: month
        tests: [not_null]

      - name: day
        tests: [not_null]

      - name: day_of_week
        description: Numeric representation of weekday.
        tests: [not_null]

      - name: hour
        tests: [not_null]

      - name: is_weekend
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false

      - name: day_name
        tests: [not_null]

      - name: month_name
        tests: [not_null]


  - name: dim_entity
    description: >
      Entity dimension derived from Wikidata.
      Represents Wikipedia-referenced entities enriched with descriptive metadata.
      Each row corresponds to one Wikidata entity.
    columns:
      - name: entity_id
        description: Wikidata entity identifier.
        tests:
          - unique
          - not_null

      - name: numeric_id
        description: Numeric component of the Wikidata identifier.
        tests:
          - not_null

      - name: en_wiki
        description: English Wikipedia page title associated with the entity.

      - name: en_label
        description: Human-readable label of the entity.

      - name: en_description
        description: Short textual description of the entity.

      - name: first_instance_of_id
        description: >
          Primary instance_of type associated with the entity.
          Selected from the instance_of array without semantic ordering guarantees.

  - name: fact_pageviews
    description: >
      Core fact table at grain (wiki, title, datehour).
      Represents aggregated pageview events from Wikipedia.
    columns:
      - name: pageview_id
        description: Surrogate key uniquely identifying a pageview record.
        tests:
          - not_null

      - name: wiki
        description: Wikipedia language edition code.
        tests:
          - not_null

      - name: title
        description: Wikipedia page title.
        tests:
          - not_null

      - name: views
        description: Number of page requests for the given hour.
        tests:
          - not_null

      - name: datehour
        description: Hourly timestamp of the pageview event.
        tests:
          - not_null

      - name: page_type
        description: Classification of page based on namespace and naming rules.
        tests:
          - not_null
          - accepted_values:
              values: [article, namespace, wikiquote, wiktionary, mediawiki, donation, commons, portal]


  - name: gold_pageviews_enriched
    description: >
      Analytical view joining pageviews with entity and language dimensions.
      Provides multilingual entity enrichment and supports downstream aggregation
      for dashboards and analytical marts.

      Includes matched and unmatched signals used to analyze coverage gaps
      between Wikipedia traffic and Wikidata coverage.
    columns:
      - name: pageview_id
        description: Surrogate key from fact_pageviews.
        tests:
          - not_null

      - name: wiki
        tests: [not_null]

      - name: title
        tests: [not_null]

      - name: views
        tests: [not_null]

      - name: page_type
        tests:
          - not_null
          - accepted_values:
              values: [article, namespace, wikiquote, wiktionary, mediawiki, donation, commons, portal]

      - name: is_matched
        description: Indicates whether pageview was matched to a Wikidata entity.
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false

      - name: language_name
        description: Human-readable Wikipedia language name.

      - name: is_mobile
        description: Indicates whether traffic originates from mobile Wikipedia.

      - name: year
      - name: month

      - name: type_label
        description: Entity type label when available.

      - name: is_structural
        description: Indicates whether matched entity type is structural.

      - name: en_label
        description: Entity label when available.



  - name: mart_semantic_attention_base
    description: >
      Core analytical cube derived from enriched Wikipedia pageviews.
      Represents the primary semantic attention surface used by downstream marts.

      Grain:
      one row per
      (datehour, analysis_key, page_type, wiki_group, language_name, is_mobile).

      This mart aggressively aggregates the gold layer in order to:
      - reduce BigQuery scan costs
      - stabilize analytical dimensions
      - provide a reusable semantic cube for downstream projections

      The mart unifies:
      - matched Wikidata entities
      - unmatched article-level attention signals

      through the analysis_key abstraction:
      - matched entities use entity identifiers
      - unmatched entries use wiki + title identifiers

      Structural Wikimedia infrastructure entities are excluded to avoid
      sparse analytical inflation caused by low-value non-content nodes.

      This mart acts as the semantic backbone for:
      - temporal trend analysis
      - cross-language propagation analysis
      - unmatched attention analysis
      - Power BI serving models

    columns:

      - name: analysis_key
        description: >
          Unified semantic identifier used across the analytical cube.

          Format:
          - E:<numeric_id> for matched Wikidata entities
          - T:<wiki>:<title> for unmatched article-level entries

        tests:
          - not_null

      - name: total_views
        description: >
          Total number of pageviews aggregated at the mart grain.
        tests:
          - not_null

      - name: rolling_7d_views
        description: >
          Rolling 7-day attention volume for the analysis_key.

      - name: unique_pages
        description: >
          Number of distinct page titles contributing to the aggregated entity.

      - name: active_wikis
        description: >
          Number of active Wikipedia editions contributing attention.

      - name: share_of_global_views
        description: >
          Relative share of total Wikipedia attention at a given hour.

      - name: share_within_language
        description: >
          Relative share of attention inside a specific language ecosystem.

      - name: article_ratio
        description: >
          Ratio of article traffic compared to non-article traffic.

      - name: match_rate_weighted
        description: >
          Weighted proportion of views successfully matched to Wikidata entities.

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "NOT is_matched OR page_type = 'article'"



  - name: mart_trend_daily
    description: >
      Temporal lifecycle mart analyzing how entity attention evolves over time.

      Grain:
      one row per
      (datehour, analysis_key, wiki_group, language_name, is_mobile).

      This mart focuses on normalized lifecycle dynamics:
      - growth
      - decline
      - peak retention
      - momentum

      Unlike language propagation marts, this model primarily emphasizes
      entity-time dynamics rather than cross-language comparison.

      Used to:
      - identify trending entities
      - compare lifecycle curves
      - detect viral attention bursts
      - analyze retention after peak visibility

    columns:

      - name: analysis_key
        description: Unified semantic identifier.
        tests:
          - not_null

      - name: peak_views
        description: >
          Historical maximum attention observed for the entity.

      - name: peak_retention
        description: >
          Normalized retention ratio:
          current attention divided by historical peak attention.

      - name: growth_rate
        description: >
          Hour-over-hour relative attention growth rate.

      - name: total_views
        description: >
          Observed attention volume at the current timestamp.


  - name: mart_semantic_attention_unmatched
    description: >
      Analytical mart dedicated to unmatched article-level attention signals.

      Represents topics receiving sustained human attention that are
      not currently linked to structured Wikidata entities.

      Grain:
      one row per
      (datehour, analysis_key, wiki_group, language_name, is_mobile).

      This mart models the semantic gap between:
      - observed collective curiosity
      - structured knowledge graph representation

      Used to:
      - identify emerging topics
      - detect semantic coverage gaps
      - measure persistence of unmatched concepts
      - analyze potential future entity absorption

    columns:

      - name: analysis_key
        description: >
          Surface-level semantic identifier using wiki + title encoding.
        tests:
          - not_null

      - name: title
        description: >
          Article title extracted from the analysis_key structure.

      - name: first_appearance
        description: >
          First observed timestamp of the unmatched signal within the analysis period.

      - name: time_to_absorption
        description: >
          Elapsed time since the first appearance of the unmatched topic.

      - name: entity_prominence
        description: >
          Cumulative attention mass accumulated by the unmatched topic.

      - name: persistence_score
        description: >
          Rolling persistence indicator measuring sustained visibility.

      - name: unmatched_velocity
        description: >
          Relative hour-over-hour attention growth for the unmatched topic.


  - name: mart_semantic_attention_language_growth
    description: >
      Cross-language analytical mart measuring attention diffusion dynamics
      across Wikipedia language ecosystems.

      Grain:
      one row per
      (datehour, analysis_key, wiki_group).

      This mart models:
      - linguistic propagation
      - cultural divergence
      - localized attention intensity
      - global agreement across language communities

      Used to:
      - identify globally synchronized entities
      - detect culturally localized attention
      - analyze multilingual propagation patterns
      - measure attention asymmetry between language ecosystems

    columns:

      - name: concurrent_language_count
        description: >
          Number of language ecosystems simultaneously discussing the entity.

      - name: growth_rate
        description: >
          Language-local hour-over-hour growth rate.

      - name: rank_in_language
        description: >
          Relative popularity rank of the entity within a language ecosystem.

      - name: relative_attention_in_language
        description: >
          Normalized attention intensity compared to the average entity
          attention inside the same language ecosystem.


  - name: mart_cross_language_propagation
    description: >
      Higher-level propagation mart derived from language growth signals.

      Focuses on:
      - diffusion stability
      - propagation persistence
      - cross-language agreement dynamics
      - relative attention concentration

      Grain:
      one row per
      (datehour, analysis_key, wiki_group).

      Used to:
      - evaluate propagation consistency across languages
      - identify globally aligned attention events
      - detect culturally polarized entities
      - analyze multilingual diffusion stability

    columns:

      - name: rolling_avg_7d_growth_rate
        description: >
          Smoothed 7-day rolling average of language-local growth rates.

      - name: language_total_views
        description: >
          Total attention volume observed within the language ecosystem.

      - name: attention_share
        description: >
          Relative share of entity attention inside the language ecosystem.

      - name: rank_dispersion
        description: >
          Cross-language standard deviation of entity ranking at a given timestamp.

          High dispersion indicates strong differences in perceived importance
          across language communities.