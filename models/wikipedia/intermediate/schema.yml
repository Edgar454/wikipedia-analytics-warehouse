version: 2

models:

  - name: int_pageviews_classified
    description: >
      Pageviews table enriched with a page_type classification derived from
      URL structure and namespace conventions.
      Used to separate real article traffic from Wikimedia infrastructure,
      system pages, and non-content namespaces.
    columns:
      - name: wiki
        description: Wikipedia language community code (e.g. en, fr.m, ja)
        tests:
          - not_null

      - name: title
        description: URL-encoded Wikipedia page title (e.g. Kobe_Bryant)
        tests:
          - not_null

      - name: views
        description: Number of HTTP requests to the page in a given hour
        tests:
          - not_null

      - name: datehour
        description: Hour-level timestamp partition of the pageview event
        tests:
          - not_null

      - name: page_type
        description: >
          Page classification derived from Wikipedia naming conventions:
          article, namespace, wikiquote, wiktionary, mediawiki, donation,
          commons, portal.
        tests:
          - not_null
          - accepted_values:
              values: [article, namespace, wikiquote, wiktionary, mediawiki, wikisource, wikibooks, wikiversity, wikivoyage, wikinews, donation, commons, wikispecies, portal]

      - name: pageview_id
        description: >
          Surrogate key identifying a unique pageview grain:
          (wiki, title, datehour)


  - name: int_structural_entities
    description: >
      Set of Wikidata entity type IDs identified as structural or
      Wikimedia-infrastructure-related nodes.
      Derived using subclass_of traversal starting from known structural roots.
      Used to filter non-content entities in analytical models.
    columns:
      - name: numeric_id
        description: Wikidata numeric ID of a structural entity type
        tests:
          - not_null

  - name: bridge_entity_sitelinks
    description: >
      Flattened Wikidata sitelinks mapping entities to Wikipedia titles
      across languages. Enables multilingual matching between pageviews
      and Wikidata entities.

      This model significantly improves match coverage compared to
      English-only joins by leveraging language-specific sitelinks.

    columns:
      - name: numeric_id
        description: Wikidata entity ID (foreign key to dim_entity)
        tests:
          - not_null

      - name: wiki_code
        description: >
          Language code derived from sitelinks site (e.g. enwiki → en).
          Used to align with pageviews wiki column after normalization.
        tests:
          - not_null

      - name: site
        description: Original Wikimedia sitelink site identifier (e.g. enwiki, frwiki)
        tests:
          - not_null

      - name: title_raw
        description: Raw page title from Wikidata sitelinks

      - name: title
        description: URL-encoded title aligned with pageviews.title format
        tests:
          - not_null
  - name: int_unmatched_surface_features
    description: >
      Intermediate feature engineering layer dedicated to unmatched
      article-level attention signals.

      This model enriches unmatched Wikipedia traffic with temporal and
      behavioral descriptors before downstream aggregation into analytical marts.

      The layer acts as a semantic staging surface between:
      - raw unmatched pageview observations
      - higher-level coverage gap analytics

      Unlike final marts, this model is not intended for direct BI exposure.
      Instead, it centralizes reusable feature computations related to
      unmatched attention dynamics.

      Used to:
      - standardize unmatched feature computation
      - reduce duplicated window calculations downstream
      - stabilize semantic gap analysis pipelines
      - support future entity absorption modeling

      Features generated in this layer characterize:
      - persistence
      - emergence velocity
      - cumulative prominence
      - temporal lifespan

    columns:

      - name: analysis_key
        description: >
          Surface-level semantic identifier encoding wiki and title information
          for unmatched entries.

        tests:
          - not_null

      - name: title
        description: >
          Article title extracted from the unmatched analysis key.

      - name: datehour
        description: >
          Hourly timestamp representing the observation grain.

        tests:
          - not_null

      - name: total_views
        description: >
          Aggregated attention volume for the unmatched topic at the current hour.

      - name: first_appearance
        description: >
          Earliest observed timestamp of the unmatched topic within the analysis window.

      - name: entity_age_hours
        description: >
          Elapsed time in hours since the first observed appearance
          of the unmatched topic.

      - name: persistence_score
        description: >
          Rolling persistence indicator measuring sustained temporal visibility.

      - name: unmatched_velocity
        description: >
          Relative hour-over-hour growth rate of unmatched attention.

      - name: entity_prominence
        description: >
          Cumulative attention mass accumulated by the unmatched topic
          across the observation period.

      - name: wiki_group
        description: >
          Wikipedia language ecosystem associated with the unmatched topic.

      - name: language_name
        description: >
          Human-readable language associated with the wiki ecosystem.

      - name: is_mobile
        description: >
          Indicates whether the attention originated from mobile Wikipedia traffic.